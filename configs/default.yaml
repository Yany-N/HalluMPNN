# ============================================
# GRPO Training Configuration
# ============================================
grpo:
  # Training
  training_steps: 500         # BetterMPNN训练轮数 (full training)
  num_generations: 4            # Variants per step (reduced for testing)
  learning_rate: 1.0e-5
  beta: 0.01                  # KL divergence weight
  temperature: 0.6            # Increased from 0.5 for more sequence diversity
  
  # Reward Weights (Quality Components)
  # These weights apply to the quality_reward portion
  reward_weights:
    iptm: 0.50              # Binding affinity
    ptm: 0.30               # Overall structure quality
    pae: 0.20               # Predicted alignment error
    specificity: 0.30       # Negative design bonus weight
    spec_gap: 0.10          # Minimum gap for specificity bonus
  
  # ============================================
  # Curriculum Learning Configuration (NEW)
  # ============================================
  curriculum:
    early_steps: 30           # End of early phase (easy requirements)
    late_steps: 80            # Start of late phase (strict requirements)
    early_threshold: 2.0      # Conf RMSD threshold during early phase (Å)
    late_threshold: 4.0       # Conf RMSD threshold during late phase (Å)
  
  # Conformational Change Target
  target_conformational_rmsd: 6.0  # Target RMSD for max reward (Å)
  
  # SBP Structure Preservation
  # Prevents rewarding high conf_rmsd that comes from structural deviation
  sbp_max_deviation: 8.0      # Max allowed bound vs scaffold RMSD (Å)
  
  # Open State Reference
  open_rmsd:
    path: "inputs/3lft-open.pdb" # Path to Open reference PDB
    cutoff: 6.0               # Max RMSD to count as "matching" open state

# ============================================
# Decoy Configuration (Negative Design)
# ============================================
# Decoys are used for two purposes:
# 1. Binding specificity: L-DOPA should have higher iPTM than decoys
# 2. Conformational specificity: Decoys should NOT cause closing
decoy_smiles: []

# Max conf_rmsd allowed for decoys (they should stay open)
decoy_max_conf_rmsd: 2.0

# ============================================
# HalluDesign Configuration
# ============================================
halludesign:
  # Enable/disable
  enabled: true               # Enabled for full training
  use_protenix: true          # Actually "use structure guidance" but via AF3 JAX"
  protenix_model_dir: "/data/home/scvi041/run/HalluDesign-main/model"
  
  # Trigger configuration (NEW periodic system)
  trigger_threshold:
    # Force trigger at this step (once only, for initial pocket refinement)
    force_trigger_step: 1
    
    # After threshold met, trigger HalluDesign every N steps
    trigger_every_n_steps: 30
    
    # Threshold conditions for periodic triggering
    iptm_min: 0.7             # Trigger when iptm >= 0.7
    ptm_min: 0.6              # AND ptm >= 0.6
    pae_max: 10.0             # AND pae <= 10.0
  
  # HalluDesign cycles when triggered
  num_cycles: 4               # Cycles per trigger
  num_sequences_per_cycle: 8  # Sequences per cycle
  
  # Pocket refinement parameters
  pocket_cutoff: 8.0          # Angstroms
  ref_time_steps: 50          # Diffusion steps for structure refinement

# ============================================
# AlphaFold3 Configuration
# ============================================
af3:
  num_seeds: 2                # Model seeds for prediction
  run_data_pipeline: false    # Skip MSA generation (use provided)
  timeout: 3600               # Seconds

# ============================================
# Checkpoint Configuration
# ============================================
checkpoint:
  save_every: 10              # Save every N steps
  keep_last: 500                # Keep last N checkpoints

# ============================================
# Logging
# ============================================
logging:
  level: "INFO"
  wandb_project: "hallumpnn"
  log_rewards: true
